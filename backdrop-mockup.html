<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>43146K KRAKEN — Booth Backdrop Mockup</title>
<style>
  /* ── CSS Reset ─────────────────────────────────────────── */
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  /* ── Color Palette ─────────────────────────────────────── */
  :root {
    --void:  #080010;
    --deep:  #1A0033;
    --royal: #6B0AC9;
    --gold:  #FFD700;
    --green: #00A550;
    --teal:  #00E5CC;
    --red:   #CC0000;
    --white: #E8E8FF;
  }

  /* ── Body ──────────────────────────────────────────────── */
  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: monospace;
    padding: 40px 20px;
  }

  /* ── Canvas ────────────────────────────────────────────── */
  .canvas {
    position: relative;
    width: 900px;
    height: 900px;
    overflow: hidden;
    flex-shrink: 0;
  }

  /* ── Full-canvas background gradients ─────────────────── */
  .canvas::before {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(ellipse 55% 35% at 20% 12%, #2a0055cc 0%, transparent 70%),
      radial-gradient(ellipse 50% 30% at 80% 10%, #1a0044bb 0%, transparent 65%),
      radial-gradient(ellipse 70% 60% at 50% 48%, #220044aa 0%, transparent 75%),
      linear-gradient(180deg, var(--deep) 0%, #100020 35%, var(--void) 65%, #000008 100%);
  }

  /* ── Zones ─────────────────────────────────────────────── */
  .zone-top {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 20%;
    z-index: 1;
  }
  .zone-center {
    position: absolute;
    top: 20%; left: 0;
    width: 100%; height: 55%;
    z-index: 1;
  }
  .zone-bottom {
    position: absolute;
    top: 75%; left: 0;
    width: 100%; height: 25%;
    z-index: 1;
  }

  /* ── Tentacles SVG ─────────────────────────────────────── */
  .tentacles {
    position: absolute;
    inset: 0;
    width: 900px; height: 900px;
    z-index: 2;
    pointer-events: none;
  }

  /* Tentacle group animations — each rocks from its base point */
  .tent-ul { animation: swayUL 4.2s ease-in-out infinite; }
  .tent-ur { animation: swayUR 3.8s ease-in-out infinite 0.6s; }
  .tent-ll { animation: swayLL 5.1s ease-in-out infinite 1.1s; }
  .tent-lr { animation: swayLR 4.7s ease-in-out infinite 0.3s; }
  .tent-sl { animation: swaySL 6.0s ease-in-out infinite 0.9s; }
  .tent-sr { animation: swaySR 5.5s ease-in-out infinite 1.5s; }

  /* ── Hero glow ─────────────────────────────────────────── */
  .hero-glow {
    position: absolute;
    width: 100%; height: 100%;
    top: 0; left: 0;
    background:
      radial-gradient(ellipse 55% 55% at 50% 48%, #00e5cc33 0%, transparent 55%),
      radial-gradient(ellipse 70% 70% at 50% 48%, #6b0ac922 0%, transparent 70%);
    z-index: 3;
    pointer-events: none;
    animation: glowBreathe 3s ease-in-out infinite;
  }

  /* ── Hero logo ─────────────────────────────────────────── */
  .hero-logo {
    position: absolute;
    width: 60%;
    left: 20%; top: 50%;
    transform: translateY(-52%);
    z-index: 3;
    filter:
      drop-shadow(0 0 18px #00e5ccaa)
      drop-shadow(0 0 40px #6b0ac988)
      drop-shadow(0 0 6px #00e5cc66);
  }

  /* ── Ocean surface fade ────────────────────────────────── */
  .ocean-surface {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 60px;
    background: linear-gradient(180deg, transparent 0%, #050010cc 70%, var(--void) 100%);
    z-index: 4;
    pointer-events: none;
  }

  .zone-center::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 80px;
    background: linear-gradient(180deg, transparent 0%, #08001088 40%, var(--void) 100%);
    z-index: 4;
    pointer-events: none;
  }

  /* ── Animated wave strip ───────────────────────────────── */
  .wave-strip {
    position: absolute;
    bottom: 55px; left: 0;
    width: 100%; height: 30px;
    z-index: 5;
    overflow: hidden;
    pointer-events: none;
  }
  .wave-inner {
    display: flex;
    width: 200%;
    height: 100%;
    animation: waveScroll 7s linear infinite;
  }
  .wave-inner svg {
    width: 50%;
    height: 100%;
    flex-shrink: 0;
  }

  /* ── Zone-bottom internals ─────────────────────────────── */
  .robots {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    z-index: 3;
    pointer-events: none;
  }

  .tagline {
    position: absolute;
    width: 100%;
    text-align: center;
    top: 50%; left: 0;
    transform: translateY(-50%);
    z-index: 5;
    pointer-events: none;
    line-height: 1.15;
  }
  .tagline-line1 {
    display: block;
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 22px; font-weight: 700;
    color: var(--gold);
    letter-spacing: 5px;
    text-transform: uppercase;
  }
  .tagline-line2 {
    display: block;
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 34px; font-weight: 900;
    color: var(--gold);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 4px;
    animation: tagGlow 2.5s ease-in-out infinite;
  }
  .school-text {
    position: absolute;
    width: 100%;
    text-align: center;
    bottom: 18px; left: 0;
    z-index: 5;
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 13px;
    color: var(--gold);
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.85;
  }

  /* ── Border frame overlay ──────────────────────────────── */
  .border-frame {
    position: absolute;
    inset: 0;
    z-index: 10;
    pointer-events: none;
  }
  .border-frame svg {
    position: absolute;
    inset: 0;
    width: 900px; height: 900px;
  }

  /* ── VEX logo ──────────────────────────────────────────── */
  .vex-logo {
    position: absolute;
    bottom: 18px; right: 18px;
    width: 90px;
    opacity: 0.85;
    z-index: 11;
  }

  /* ── Preview label ─────────────────────────────────────── */
  .preview-label {
    margin-top: 18px;
    color: #888;
    font-family: monospace;
    font-size: 13px;
    text-align: center;
    letter-spacing: 1px;
  }

  /* ═══════════════════════════════════════════════════════
     ANIMATIONS
  ═══════════════════════════════════════════════════════ */

  /* ── Tentacle sway (rocks from base point) ── */
  @keyframes swayUL {
    0%,100% { transform-origin: 390px 310px; transform: rotate(0deg); }
    33%     { transform-origin: 390px 310px; transform: rotate(2.2deg); }
    66%     { transform-origin: 390px 310px; transform: rotate(-1.5deg); }
  }
  @keyframes swayUR {
    0%,100% { transform-origin: 510px 310px; transform: rotate(0deg); }
    40%     { transform-origin: 510px 310px; transform: rotate(-2.2deg); }
    70%     { transform-origin: 510px 310px; transform: rotate(1.5deg); }
  }
  @keyframes swayLL {
    0%,100% { transform-origin: 380px 560px; transform: rotate(0deg); }
    45%     { transform-origin: 380px 560px; transform: rotate(2.8deg); }
    80%     { transform-origin: 380px 560px; transform: rotate(-2deg); }
  }
  @keyframes swayLR {
    0%,100% { transform-origin: 520px 560px; transform: rotate(0deg); }
    30%     { transform-origin: 520px 560px; transform: rotate(-2.8deg); }
    65%     { transform-origin: 520px 560px; transform: rotate(2deg); }
  }
  @keyframes swaySL {
    0%,100% { transform-origin: 360px 430px; transform: translateY(0px) scaleY(1); }
    50%     { transform-origin: 360px 430px; transform: translateY(6px) scaleY(1.02); }
  }
  @keyframes swaySR {
    0%,100% { transform-origin: 540px 430px; transform: translateY(0px) scaleY(1); }
    50%     { transform-origin: 540px 430px; transform: translateY(-6px) scaleY(1.02); }
  }

  /* ── Lightning flash — irregular multi-burst flicker ── */
  @keyframes flashL {
    0%,80%,82%,84%,87%,100% { opacity: 0.04; }
    81%,83%   { opacity: 1.0; }
    85%,86%   { opacity: 0.7; }
  }
  @keyframes flashR {
    0%,65%,67%,70%,100% { opacity: 0.04; }
    66%,68%  { opacity: 0.95; }
    69%      { opacity: 0.5; }
  }
  @keyframes flashC {
    0%,91%,93%,95%,100% { opacity: 0.06; }
    92%,94% { opacity: 0.55; }
  }

  /* ── Robot throw — flung from Kraken, arc to edges, loop ── */
  @keyframes throwL {
    0%,2%    { transform: translate(420px,-10px) rotate(0deg) scale(0.25); opacity: 0; }
    6%       { opacity: 1; }
    55%      { transform: translate(200px,90px) rotate(-55deg) scale(0.75); opacity: 0.9; }
    88%      { transform: translate(30px,170px) rotate(-105deg) scale(0.45); opacity: 0.2; }
    92%,100% { transform: translate(420px,-10px) rotate(0deg) scale(0.25); opacity: 0; }
  }
  @keyframes throwR {
    0%,2%    { transform: translate(480px,-10px) rotate(0deg) scale(0.25); opacity: 0; }
    6%       { opacity: 1; }
    55%      { transform: translate(700px,90px) rotate(55deg) scale(0.75); opacity: 0.9; }
    88%      { transform: translate(870px,170px) rotate(105deg) scale(0.45); opacity: 0.2; }
    92%,100% { transform: translate(480px,-10px) rotate(0deg) scale(0.25); opacity: 0; }
  }

  /* ── Ocean wave scroll ── */
  @keyframes waveScroll {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  /* ── Hero glow breathe ── */
  @keyframes glowBreathe {
    0%,100% { opacity: 0.70; }
    50%     { opacity: 1.00; }
  }

  /* ── Tagline teal glow pulse ── */
  @keyframes tagGlow {
    0%,100% {
      text-shadow:
        0 0 12px var(--teal),
        0 0 28px var(--teal),
        0 0 48px #00e5cc88;
    }
    50% {
      text-shadow:
        0 0 22px var(--teal),
        0 0 55px var(--teal),
        0 0 90px #00e5cccc,
        0 0 120px #00e5cc44;
    }
  }
</style>
</head>
<body>

<div class="canvas">

  <!-- ① Full-canvas tentacle SVG (z-index 2) -->
  <svg class="tentacles" viewBox="0 0 900 900" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="tentGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- Upper-left tentacle -->
    <g class="tent-ul">
      <path d="M 390,310 C 300,250 180,180 60,80"
            stroke="#6B0AC9" stroke-width="22" fill="none"
            stroke-linecap="round" opacity="0.72" filter="url(#tentGlow)"/>
      <path d="M 390,310 C 300,250 180,180 60,80"
            stroke="#00E5CC" stroke-width="4" fill="none"
            stroke-linecap="round" opacity="0.55"/>
    </g>

    <!-- Upper-right tentacle -->
    <g class="tent-ur">
      <path d="M 510,310 C 600,250 720,180 840,80"
            stroke="#6B0AC9" stroke-width="22" fill="none"
            stroke-linecap="round" opacity="0.72" filter="url(#tentGlow)"/>
      <path d="M 510,310 C 600,250 720,180 840,80"
            stroke="#00E5CC" stroke-width="4" fill="none"
            stroke-linecap="round" opacity="0.55"/>
    </g>

    <!-- Lower-left tentacle -->
    <g class="tent-ll">
      <path d="M 380,560 C 280,620 160,680 50,780"
            stroke="#6B0AC9" stroke-width="18" fill="none"
            stroke-linecap="round" opacity="0.65" filter="url(#tentGlow)"/>
      <path d="M 380,560 C 280,620 160,680 50,780"
            stroke="#00E5CC" stroke-width="3" fill="none"
            stroke-linecap="round" opacity="0.50"/>
    </g>

    <!-- Lower-right tentacle -->
    <g class="tent-lr">
      <path d="M 520,560 C 620,620 740,680 850,780"
            stroke="#6B0AC9" stroke-width="18" fill="none"
            stroke-linecap="round" opacity="0.65" filter="url(#tentGlow)"/>
      <path d="M 520,560 C 620,620 740,680 850,780"
            stroke="#00E5CC" stroke-width="3" fill="none"
            stroke-linecap="round" opacity="0.50"/>
    </g>

    <!-- Side-left tentacle -->
    <g class="tent-sl">
      <path d="M 360,430 C 200,410 100,430 20,450"
            stroke="#6B0AC9" stroke-width="14" fill="none"
            stroke-linecap="round" opacity="0.60" filter="url(#tentGlow)"/>
    </g>

    <!-- Side-right tentacle -->
    <g class="tent-sr">
      <path d="M 540,430 C 700,410 800,430 880,450"
            stroke="#6B0AC9" stroke-width="14" fill="none"
            stroke-linecap="round" opacity="0.60" filter="url(#tentGlow)"/>
    </g>
  </svg>

  <!-- ② Zone Top: lightning + arched team name -->
  <div class="zone-top">
    <svg viewBox="0 0 900 180" xmlns="http://www.w3.org/2000/svg"
         style="position:absolute;inset:0;width:100%;height:100%;">
      <defs>
        <filter id="goldGlow" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="4" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
        <path id="teamNameArc" d="M 80,160 A 370,370 0 0,1 820,160"/>
      </defs>

      <!-- Left lightning — animated flash -->
      <polyline class="bolt-l1" points="110,10 90,75 115,75 85,165"
                stroke="#FFD700" stroke-width="3" fill="none"
                style="animation: flashL 5.3s ease-in-out infinite;"/>
      <polyline class="bolt-l2" points="130,20 112,78 135,78 108,158"
                stroke="#FFD700" stroke-width="1.5" fill="none"
                style="animation: flashL 5.3s ease-in-out infinite 0.08s;"/>

      <!-- Right lightning — animated flash, offset timing -->
      <polyline class="bolt-r1" points="790,10 810,75 785,75 815,165"
                stroke="#FFD700" stroke-width="3" fill="none"
                style="animation: flashR 4.1s ease-in-out infinite 0.4s;"/>
      <polyline class="bolt-r2" points="770,20 788,78 765,78 792,158"
                stroke="#FFD700" stroke-width="1.5" fill="none"
                style="animation: flashR 4.1s ease-in-out infinite 0.5s;"/>

      <!-- Center veins — subtle flicker -->
      <polyline points="420,0 408,55 425,55 398,110"
                stroke="#E8E8FF" stroke-width="1.5" fill="none"
                style="animation: flashC 7.2s ease-in-out infinite;"/>
      <polyline points="460,0 472,50 455,50 480,105"
                stroke="#E8E8FF" stroke-width="1.2" fill="none"
                style="animation: flashC 7.2s ease-in-out infinite 0.12s;"/>
      <polyline points="480,5 490,45 473,45 495,95"
                stroke="#E8E8FF" stroke-width="1" fill="none"
                style="animation: flashC 7.2s ease-in-out infinite 0.22s;"/>

      <!-- Arched team name -->
      <text font-family="'Georgia', 'Times New Roman', serif"
            font-size="28" font-weight="900"
            fill="#FFD700" letter-spacing="6"
            filter="url(#goldGlow)">
        <textPath href="#teamNameArc" startOffset="50%" text-anchor="middle">
          &#x269C; 43146K KRAKEN &#x269C;
        </textPath>
      </text>
    </svg>
  </div>

  <!-- ③ Zone Center: hero logo with glow + animated waves -->
  <div class="zone-center">
    <div class="hero-glow"></div>
    <img class="hero-logo" src="Kraken 43146K Logo.png" alt="Kraken 43146K Mascot Logo">
    <!-- Animated wave strip just above ocean surface -->
    <div class="wave-strip">
      <div class="wave-inner">
        <!-- Tile the wave twice so the scroll loop is seamless -->
        <svg viewBox="0 0 900 30" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M0,15 C75,3 150,27 225,15 C300,3 375,27 450,15 C525,3 600,27 675,15 C750,3 825,27 900,15 L900,30 L0,30 Z"
                fill="#00E5CC" opacity="0.12"/>
          <path d="M0,20 C60,8 130,28 200,18 C270,8 340,28 410,18 C480,8 550,28 620,18 C690,8 760,28 830,18 C870,10 900,20 900,20 L900,30 L0,30 Z"
                fill="#6B0AC9" opacity="0.18"/>
        </svg>
        <!-- Second copy for seamless loop -->
        <svg viewBox="0 0 900 30" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M0,15 C75,3 150,27 225,15 C300,3 375,27 450,15 C525,3 600,27 675,15 C750,3 825,27 900,15 L900,30 L0,30 Z"
                fill="#00E5CC" opacity="0.12"/>
          <path d="M0,20 C60,8 130,28 200,18 C270,8 340,28 410,18 C480,8 550,28 620,18 C690,8 760,28 830,18 C870,10 900,20 900,20 L900,30 L0,30 Z"
                fill="#6B0AC9" opacity="0.18"/>
        </svg>
      </div>
    </div>
    <div class="ocean-surface"></div>
  </div>

  <!-- ④ Zone Bottom: robots thrown + tagline + school text -->
  <div class="zone-bottom">
    <svg class="robots" viewBox="0 0 900 225" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="robotGlow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Left robot — thrown from Kraken center, arcs to bottom-left -->
      <g style="animation: throwL 4.5s ease-in infinite; filter: url(#robotGlow);">
        <rect x="-18" y="-22" width="36" height="44" rx="5"
              fill="#6B0AC9" stroke="#00E5CC" stroke-width="2"/>
        <rect x="-12" y="-38" width="24" height="18" rx="4"
              fill="#6B0AC9" stroke="#00E5CC" stroke-width="1.5"/>
        <circle cx="-5" cy="-31" r="3" fill="#00E5CC"/>
        <circle cx="5"  cy="-31" r="3" fill="#00E5CC"/>
        <circle cx="-22" cy="16" r="8" fill="none" stroke="#00E5CC" stroke-width="2"/>
        <circle cx="22"  cy="16" r="8" fill="none" stroke="#00E5CC" stroke-width="2"/>
      </g>

      <!-- Right robot — thrown from Kraken center, arcs to bottom-right -->
      <g style="animation: throwR 4.5s ease-in infinite 0.7s; filter: url(#robotGlow);">
        <rect x="-18" y="-22" width="36" height="44" rx="5"
              fill="#6B0AC9" stroke="#00E5CC" stroke-width="2"/>
        <rect x="-12" y="-38" width="24" height="18" rx="4"
              fill="#6B0AC9" stroke="#00E5CC" stroke-width="1.5"/>
        <circle cx="-5" cy="-31" r="3" fill="#00E5CC"/>
        <circle cx="5"  cy="-31" r="3" fill="#00E5CC"/>
        <circle cx="-22" cy="16" r="8" fill="none" stroke="#00E5CC" stroke-width="2"/>
        <circle cx="22"  cy="16" r="8" fill="none" stroke="#00E5CC" stroke-width="2"/>
      </g>
    </svg>

    <!-- Tagline -->
    <div class="tagline">
      <span class="tagline-line1">THEY SAID PUSHBACK.</span>
      <span class="tagline-line2">THE KRAKEN SAID NO.</span>
    </div>

    <!-- School text -->
    <div class="school-text">
      BARBE HIGH SCHOOL &nbsp;·&nbsp; LAKE CHARLES, LA
    </div>
  </div>

  <!-- ⑤ Border frame (z-index 10) -->
  <div class="border-frame">
    <svg viewBox="0 0 900 900" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="beadH" x="0" y="0" width="20" height="10"
                 patternUnits="userSpaceOnUse">
          <circle cx="5"  cy="5" r="3.5" fill="#FFD700" opacity="0.85"/>
          <circle cx="15" cy="5" r="3.5" fill="#00E5CC" opacity="0.75"/>
        </pattern>
        <pattern id="beadV" x="0" y="0" width="10" height="20"
                 patternUnits="userSpaceOnUse">
          <circle cx="5" cy="5"  r="3.5" fill="#00A550" opacity="0.80"/>
          <circle cx="5" cy="15" r="3.5" fill="#FFD700" opacity="0.85"/>
        </pattern>
        <filter id="cornerGlow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <rect x="4" y="4" width="892" height="892" rx="4"
            fill="none" stroke="#FFD700" stroke-width="3" opacity="0.90"/>
      <rect x="14" y="14" width="872" height="872" rx="3"
            fill="none" stroke="#6B0AC9" stroke-width="2" opacity="0.80"/>
      <rect x="22" y="22" width="856" height="856" rx="2"
            fill="none" stroke="#FFD700" stroke-width="1" opacity="0.40"/>

      <rect x="4" y="4"   width="892" height="10" fill="url(#beadH)" opacity="0.90"/>
      <rect x="4" y="886" width="892" height="10" fill="url(#beadH)" opacity="0.90"/>
      <rect x="4" y="4"   width="10" height="892" fill="url(#beadV)" opacity="0.90"/>
      <rect x="886" y="4" width="10" height="892" fill="url(#beadV)" opacity="0.90"/>

      <!-- Scroll-work top center -->
      <g opacity="0.70">
        <path d="M 390,18 C 370,10 340,20 330,35 C 320,50 335,62 350,55 C 365,48 360,32 345,38"
              stroke="#FFD700" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M 510,18 C 530,10 560,20 570,35 C 580,50 565,62 550,55 C 535,48 540,32 555,38"
              stroke="#FFD700" stroke-width="2" fill="none" stroke-linecap="round"/>
        <polygon points="450,10 458,20 450,30 442,20" fill="#FFD700" opacity="0.85"/>
        <line x1="330" y1="36" x2="442" y2="20" stroke="#FFD700" stroke-width="1" opacity="0.50"/>
        <line x1="570" y1="36" x2="458" y2="20" stroke="#FFD700" stroke-width="1" opacity="0.50"/>
      </g>
